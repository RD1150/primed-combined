const DirectionBadge = ({ direction }) => {
  const config = {
    up: { label: "Trending Up", bg: "rgba(16,185,129,0.12)", color: "#10b981", icon: "↑" },
    down: { label: "Trending Down", bg: "rgba(239,68,68,0.12)", color: "#ef4444", icon: "↓" },
    mixed: { label: "Mixed Signal", bg: "rgba(245,158,11,0.12)", color: "#f59e0b", icon: "↕" }
  };
  const c = config[direction];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600,
      background: c.bg, color: c.color, letterSpacing: "0.03em"
    }}>
      {c.icon} {c.label}
    </span>
  );
};

const HeatBadge = ({ heat, size = "sm" }) => {
  const colors = {
    Critical: { bg: "#FEE2E2", text: "#B91C1C", icon: "⚠️" },
    High: { bg: "#FEF3C7", text: "#B45309", icon: null },
    Medium: { bg: "#DBEAFE", text: "#1D4ED8", icon: null }
  };
  const c = colors[heat];
  const sizing = size === "lg"
    ? { padding: "6px 12px", fontSize: 11, gap: 5 }
    : { padding: "3px 10px", fontSize: 10, gap: 4 };
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: sizing.gap,
      padding: sizing.padding, borderRadius: 6, fontSize: sizing.fontSize, fontWeight: 700,
      background: c.bg, color: c.text, letterSpacing: "0.08em", textTransform: "uppercase",
      border: `1px solid ${c.text}1a`
    }}>
      {c.icon && <span style={{ fontSize: sizing.fontSize + 1 }}>{c.icon}</span>}
      {heat}
    </span>
  );
};

function Primed() {
  // Auth state
  const initialResetToken = (() => {
    const h = typeof window !== "undefined" ? window.location.hash || "" : "";
    const m = h.match(/^#\/reset-password\?token=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : "";
  })();
  const [authScreen, setAuthScreen] = useState(
    initialResetToken ? "reset" : (getToken() ? null : "login")
  ); // null = logged in, "login", "signup", "forgot", "reset"
  const [authEmail, setAuthEmail] = useState("");
  const [authPass, setAuthPass] = useState("");
  const [authName, setAuthName] = useState("");
  const [authError, setAuthError] = useState("");
  const [authInfo, setAuthInfo] = useState("");
  const [authLoading, setAuthLoading] = useState(false);
  const [resetToken, setResetToken] = useState(initialResetToken);
  const [user, setUser] = useState(getUser());
  const [billingStatus, setBillingStatus] = useState(null);

  // Fetch billing status after login
  useEffect(() => {
    if (!authScreen && getToken()) {
      fetch(API_URL + "/billing/status", {
        headers: { "Authorization": "Bearer " + getToken() }
      }).then(r => r.json()).then(d => setBillingStatus(d)).catch(() => {});
    }
  }, [authScreen]);

  // Sync browser-autofilled input values into React state.
  // Chrome/Safari autofill writes to input.value without firing onChange,
  // so without this, the form submits with empty strings.
  useEffect(() => {
    if (!authScreen) return;
    const t = setTimeout(() => {
      const emailEl = document.querySelector('input[type="email"]');
      const passEl = document.querySelector('input[type="password"]');
      if (emailEl && emailEl.value && !authEmail) setAuthEmail(emailEl.value);
      if (passEl && passEl.value && !authPass) setAuthPass(passEl.value);
    }, 250);
    return () => clearTimeout(t);
  }, [authScreen]);

  const handleSubscribe = async () => {
    try {
      const res = await fetch(API_URL + "/billing/create-checkout", {
        method: "POST",
        headers: { "Authorization": "Bearer " + getToken() }
      });
      const data = await res.json();
      if (data.checkout_url) window.location.href = data.checkout_url;
    } catch (err) { console.error("Checkout error:", err); }
  };

  const handleManageBilling = async () => {
    try {
      const res = await fetch(API_URL + "/billing/portal", {
        method: "POST",
        headers: { "Authorization": "Bearer " + getToken() }
      });
      const data = await res.json();
      if (data.portal_url) window.location.href = data.portal_url;
    } catch (err) { console.error("Portal error:", err); }
  };

  const handleAuth = useCallback(async (isSignup) => {
    setAuthLoading(true);
    setAuthError("");
    setAuthInfo("");
    try {
      const endpoint = isSignup ? "/auth/register" : "/auth/login";
      const body = isSignup
        ? { email: authEmail, password: authPass, name: authName }
        : { email: authEmail, password: authPass };
      const res = await fetch(API_URL + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = { detail: text }; }
      if (!res.ok) { setAuthError(data.detail || "Error: " + res.status); setAuthLoading(false); return; }
      if (data.password_setup_required) {
        setAuthInfo("We see you're already on our list. Check your inbox for a link to set your password.");
        setAuthPass("");
        setAuthLoading(false);
        return;
      }
      setToken(data.access_token);
      setUserData(data.user);
      setUser(data.user);
      setAuthScreen(null);
    } catch (err) {
      setAuthError("Connection failed: " + err.message);
    }
    setAuthLoading(false);
  }, [authEmail, authPass, authName]);

  const handleForgot = useCallback(async () => {
    setAuthLoading(true);
    setAuthError("");
    setAuthInfo("");
    try {
      await fetch(API_URL + "/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: authEmail })
      });
      setAuthInfo("If that email is registered, a password reset link is on its way. Check your inbox.");
    } catch (err) {
      setAuthError("Connection failed: " + err.message);
    }
    setAuthLoading(false);
  }, [authEmail]);

  const handleReset = useCallback(async () => {
    setAuthLoading(true);
    setAuthError("");
    setAuthInfo("");
    try {
      const res = await fetch(API_URL + "/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: resetToken, new_password: authPass })
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = { detail: text }; }
      if (!res.ok) { setAuthError(data.detail || "Error: " + res.status); setAuthLoading(false); return; }
      setToken(data.access_token);
      setUserData(data.user);
      setUser(data.user);
      if (typeof window !== "undefined") {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
      setResetToken("");
      setAuthPass("");
      setAuthScreen(null);
    } catch (err) {
      setAuthError("Connection failed: " + err.message);
    }
    setAuthLoading(false);
  }, [resetToken, authPass]);

  const handleLogout = () => { clearAuth(); setUser(null); setAuthScreen("login"); };

  // App state
  const [selectedScenario, setSelectedScenario] = useState(null);
  const [activeTab, setActiveTab] = useState("synopsis");
  const [searchTerm, setSearchTerm] = useState("");
  const [filterCategory, setFilterCategory] = useState("All");
  const [animateIn, setAnimateIn] = useState(false);
  const [customPrompt, setCustomPrompt] = useState("");
  const [isGenerating, setIsGenerating] = useState(false);
  const [generatedScenario, setGeneratedScenario] = useState(null);
  const [showCustom, setShowCustom] = useState(false);
  const [copiedSection, setCopiedSection] = useState(null);
  const [scriptFormat, setScriptFormat] = useState("conversation");
  
  // Voice practice state
  const [voiceEnabled, setVoiceEnabled] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [isPlaying, setIsPlaying] = useState(false);
  const recognitionRef = useRef(null);
  const audioRef = useRef(null);

  // Start voice recording using Web Speech API
  const startRecording = useCallback(() => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert("Voice is not supported in this browser. Try Chrome.");
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      setPracticeInput(transcript);
      setIsRecording(false);
      // Auto-send after voice input
      setTimeout(() => {
        const userMsg = { role: "agent", content: transcript };
        setPracticeMessages(prev => [...prev, userMsg]);
        setPracticeInput("");
        sendVoiceMessage(transcript);
      }, 300);
    };
    
    recognition.onerror = () => setIsRecording(false);
    recognition.onend = () => setIsRecording(false);
    
    recognitionRef.current = recognition;
    recognition.start();
    setIsRecording(true);
  }, []);

  const stopRecording = useCallback(() => {
    if (recognitionRef.current) {
      recognitionRef.current.stop();
    }
    setIsRecording(false);
  }, []);

  // Send message and play TTS response
  const sendVoiceMessage = useCallback(async (text) => {
    setPracticeLoading(true);
    try {
      const transcript = [...practiceMessages, { role: "agent", content: text }].map(m =>
        m.role === "agent" ? { role: "user", content: m.content } : { role: "assistant", content: m.content }
      );
      
      // Get AI response
      const response = await fetch(API_URL + "/ai/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + getToken() },
        body: JSON.stringify({ max_tokens: 1000, system: buildPracticePrompt(), messages: transcript })
      });

  const renderSynopsis = () => (
    <div style={{ opacity: animateIn ? 1 : 0, transform: animateIn ? "translateY(0)" : "translateY(12px)", transition: "all 0.4s cubic-bezier(0.4,0,0.2,1)" }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 16, marginBottom: 28 }}>
        <div style={{
          width: 56, height: 56, borderRadius: 14,
          background: "rgba(224,90,51,0.06)",
          border: "1px solid rgba(224,90,51,0.15)",

          fontSize: 28, flexShrink: 0
        }}>
          {currentScenario.icon}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <h2 style={{ margin: 0, fontSize: 30, fontWeight: 400, color: "#1a1a1a", letterSpacing: "-0.015em", lineHeight: 1.15, fontFamily: "'Instrument Serif', Georgia, serif" }}>
            {currentScenario.title}

        {currentScenario.synopsis}
      </p>
      <div style={{
        marginTop: 28, padding: "14px 18px", borderRadius: 10,
        background: "rgba(224,90,51,0.04)",
        border: "1px solid rgba(224,90,51,0.1)",
        fontSize: 12, color: "rgba(224,90,51,0.8)",
        fontFamily: "'IBM Plex Mono', monospace",
        display: "flex", alignItems: "center", gap: 8,
        maxWidth: "70ch"
      }}>
        <span style={{ fontSize: 14 }}>→</span>
        Navigate tabs above for market impact, talk tracks, and client scripts
      </div>
    </div>
  );

  const renderImpact = () => (
    <div style={{ opacity: animateIn ? 1 : 0, transition: "opacity 0.4s" }}>
      <div style={S.sectionTitle}>Market Impact Assessment</div>
      {currentScenario.realEstateImpact.map((impact, i) => (
        <div key={i} style={{
          ...S.impactCard,
          opacity: animateIn ? 1 : 0,

  const renderTeam = () => (
    <div style={{ opacity: animateIn ? 1 : 0, transition: "opacity 0.4s" }}>
      <div style={{ marginBottom: 36 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={S.sectionTitle}>Team Talk Track</div>
          <button
            onClick={() => handleCopy(currentScenario.teamTalkingPoints.join("\n\n"), "team")}
            style={{ ...S.copyBtn(copiedSection === "team"), position: "static" }}
          >
            {copiedSection === "team" ? "✓ Copied" : "Copy All"}
          </button>
        </div>
        {currentScenario.teamTalkingPoints.map((point, i) => (
          <div key={i} style={{
            ...S.talkingPoint,
            opacity: animateIn ? 1 : 0,
            transform: animateIn ? "translateX(0)" : "translateX(-12px)",
            transition: `all 0.35s cubic-bezier(0.4,0,0.2,1) ${i * 0.06}s`

        ))}

      <div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={S.sectionTitle}>Brokerage Talk Track</div>
          <button
            onClick={() => handleCopy(currentScenario.brokerageTalkingPoints.join("\n\n"), "brokerage")}
            style={{ ...S.copyBtn(copiedSection === "brokerage"), position: "static" }}
          >
            {copiedSection === "brokerage" ? "✓ Copied" : "Copy All"}

        {currentScenario.brokerageTalkingPoints.map((point, i) => (
          <div key={i} style={{
            ...S.talkingPoint,
            opacity: animateIn ? 1 : 0,
            transform: animateIn ? "translateX(0)" : "translateX(-12px)",
            transition: `all 0.35s cubic-bezier(0.4,0,0.2,1) ${(i + 5) * 0.06}s`
          }}>
            <div style={{ ...S.talkingPointNum, background: "rgba(59,130,246,0.1)", color: "#3b82f6", borderRadius: 6 }}>{i + 1}</div>
            <div style={S.talkingPointText}>{point}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // Generate script variants from the base clientScript
  const getQuickScript = (script) => {
    if (!script) return "";
    const lines = script.split("\n").filter(l => l.trim() && !l.includes("[") && !l.includes("LISTEN"));
    return lines.slice(0, 2).join(" ").replace(/\\n/g, " ").substring(0, 300);
  };

  const getHighConvictionScript = (script) => {
    if (!script) return "";
    return script.replace(/I'd recommend/g, "Here's what we need to do")
      .replace(/I'd suggest/g, "Here's my recommendation")
      .replace(/What do you think/g, "Let's move forward")
      .replace(/Would you like/g, "I'm going to")
      .replace(/Can I/g, "I'd like to")
      .replace(/Maybe we could/g, "We should")
      .replace(/I think/g, "I'm confident")
      .replace(/possibly/gi, "likely")
      .replace(/might/g, "will");
  };

  const SCRIPT_FORMATS = [
    { id: "quick", label: "Quick Response", desc: "1-2 sentences — use at networking events, casual conversations, or when caught off guard" },
    { id: "conversation", label: "Full Conversation", desc: "Natural back-and-forth — use at listing appointments, buyer consultations, or scheduled calls" },
    { id: "highConviction", label: "High Conviction", desc: "Direct and confident — use when the client needs decisive leadership or is wavering" }
  ];

  const COMMON_OBJECTIONS = {
    "Pricing": [
      { objection: "But my home has more upgrades than the comps.", response: "You're right that upgrades add value — and we'll highlight every one of them. What the data shows is that upgrades typically recover 60-80% of cost in the sale price, not dollar-for-dollar. Let me show you exactly how I've factored yours in." },
      { objection: "I can always lower the price later if it doesn't sell.", response: "You could, but here's what happens: the first 14 days generate 80% of your buyer interest. A price reduction after that signals desperation to buyers and their agents. You end up netting less than if we'd priced it right from the start." },
      { objection: "Online estimates say it's worth more.", response: "Those tools are great starting points, but they can't walk through your home. They miss condition, updates, and neighborhood nuances. Let me show you what actual buyers have paid for similar homes in the last 60 days — that's your real market value." }
    ],
    "Negotiation": [
      { objection: "I don't want to negotiate — just reject it.", response: "I understand the frustration. But consider this: this buyer is pre-approved and motivated. Rejecting outright means starting over — more showings, more days on market, more uncertainty. Let me counter strategically and see where they land." },
      { objection: "We can't afford to come up any higher.", response: "Let's look at this from a different angle. What if we adjust the terms instead of the price? A faster closing, covering some of the seller's costs, or adjusting contingencies can make your offer more attractive without increasing your out-of-pocket." },
      { objection: "Why should I pay your commission when I found the house myself?", response: "Finding the home is actually just the beginning. My value is in negotiating the best price, navigating inspection issues, coordinating financing, and protecting you legally through closing. On average, represented buyers pay 3-5% less than unrepresented ones — that savings alone exceeds my fee." }
    ],
    "Market": [
      { objection: "I'll just wait until the market corrects.", response: "I understand that instinct. But here's what history shows: people who try to time the market almost always miss. Meanwhile, you're paying rent or carrying costs, and if rates drop, competition surges and prices go up. Let's look at the numbers for your specific situation." },
      { objection: "The news says the market is slowing down.", response: "Headlines sell fear, but your local market tells a different story. Let me show you what's actually happening in our area — days on market, inventory levels, sale prices. National trends don't buy your house; local buyers do." },
      { objection: "Interest rates are too high right now.", response: "I hear you. But remember — you marry the house, you date the rate. When rates drop, you refinance. But you can't go back and buy at today's prices once demand surges. The cost of waiting often exceeds the rate savings." }
    ],
    "Prospecting": [
      { objection: "I already have an agent.", response: "That's great — having representation is important. I'm not here to step on anyone's toes. If you ever want a second opinion or your situation changes, I'd love to be a resource. Can I send you my market updates in the meantime?" },
      { objection: "I'm not interested in selling right now.", response: "Totally understand — there's no pressure. Would it be helpful to know what your home is worth in today's market? Even if you're not selling, it's valuable information for financial planning. I can send you a quick analysis." },
      { objection: "We had a bad experience with our last agent.", response: "I'm sorry to hear that. Can I ask what happened? I want to make sure that if we ever work together, those issues don't repeat. My approach is [address their specific pain point] — and I'm happy to earn your trust over time." }
    ],
    "Life Transition": [
      { objection: "We're not emotionally ready to sell yet.", response: "That's completely valid — this is a big decision and there's no right timeline except yours. What I can do is get everything prepared so that when you are ready, we can move quickly and smoothly. No pressure, just preparation." },
      { objection: "The family can't agree on what to do.", response: "That's more common than you'd think. What I've found helpful is putting the facts on the table — what the property is worth, what the options are, what the financial implications look like — so everyone can make an informed decision. Would a no-obligation consultation help?" },
      { objection: "We don't want to deal with the hassle of selling.", response: "I completely understand — it can feel overwhelming. That's exactly what I'm here for. I handle everything: staging, showings, negotiations, paperwork. Most of my clients tell me it was much easier than they expected because I took the burden off them." }
    ],
    "Buyer": [
      { objection: "We want to keep looking before we decide.", response: "Absolutely — you should feel confident in your choice. My only concern is that in this market, homes at this price point are averaging [X] days before going under contract. Let me set up alerts so if something better comes along, you'll know immediately. But I'd hate for you to lose this one while searching for perfect." },
      { objection: "We need to sell our current home first.", response: "That's a common situation and there are several ways to handle it. We could make your offer contingent on the sale of your home, explore bridge financing, or I could list your home now to get that process started. Let me walk you through the options." },
      { objection: "We're worried about overpaying.", response: "That's a smart concern. Let me show you the comps — what similar homes have actually sold for, not just listed for. If the data supports the price, you're not overpaying — you're paying market value. And I'll negotiate hard to make sure you're getting the best deal possible." }
    ],
    "Objection": [
      { objection: "We want to wait until after the election.", response: "I understand the uncertainty. But here's what the data shows: in the last 6 election cycles, housing prices continued to rise regardless of who won. The market responds to fundamentals — jobs, inventory, rates — not elections. Let me show you the historical data." },
      { objection: "We want to wait for spring.", response: "Spring does bring more inventory — but it also brings 40% more buyers. Right now, you have less competition and more negotiating power. The 'spring is better' belief is one of the most expensive myths in real estate." },
      { objection: "What if we buy and the value drops?", response: "In the short term, anything is possible. But if you're planning to be in this home for 5+ years, history strongly favors you. Real estate has appreciated in 90% of 5-year periods over the last 50 years. The real risk is waiting and paying more later." }
    ]
  };

  const getObjectionsForScenario = () => {
    if (!currentScenario) return [];
    const cat = currentScenario.category;
    return COMMON_OBJECTIONS[cat] || COMMON_OBJECTIONS["Market"] || [];
  };

  const renderScript = () => {
    const script = currentScenario.clientScript;
    const quickScript = getQuickScript(script);
    const highScript = getHighConvictionScript(script);
    const objections = getObjectionsForScenario();
    const currentScript = scriptFormat === "quick" ? quickScript : scriptFormat === "highConviction" ? highScript : script;

    return (
      <div style={{ opacity: animateIn ? 1 : 0, transition: "opacity 0.4s" }}>
        <div style={S.sectionTitle}>Client Interaction Script</div>

        {/* Script Format Selector */}
        <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
          {SCRIPT_FORMATS.map(f => (
            <button key={f.id} onClick={() => setScriptFormat(f.id)} style={{
              padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600,
              border: "1px solid", cursor: "pointer", transition: "all 0.2s",
              fontFamily: "'IBM Plex Mono', monospace",
              borderColor: scriptFormat === f.id ? "#e05a33" : "rgba(0,0,0,0.1)",
              background: scriptFormat === f.id ? "rgba(224,90,51,0.06)" : "#fff",
              color: scriptFormat === f.id ? "#e05a33" : "rgba(0,0,0,0.5)"
            }}>
              {f.label}
            </button>
          ))}
        </div>
        <p style={{ fontSize: 12, color: "rgba(0,0,0,0.4)", marginBottom: 16, lineHeight: 1.5, fontStyle: "italic" }}>
          {SCRIPT_FORMATS.find(f => f.id === scriptFormat)?.desc}
        </p>

        {/* Script Content */}
        <div style={S.scriptBox}>
          <button
            onClick={() => handleCopy(currentScript, "script")}
            style={S.copyBtn(copiedSection === "script")}
          >
            {copiedSection === "script" ? "✓ Copied" : "Copy Script"}
          </button>
          {currentScript}
        </div>

        {/* Objection Handling */}
        {objections.length > 0 && (
          <div style={{ marginTop: 36 }}>
            <div style={S.sectionTitle}>Common Objections</div>
            <p style={{ fontSize: 12, color: "rgba(0,0,0,0.4)", marginBottom: 16, lineHeight: 1.5 }}>
              If the client pushes back, here's how to respond naturally.
            </p>
            {objections.map((obj, i) => (
              <div key={i} style={{
                marginBottom: 16, padding: "18px 20px", borderRadius: 12,
                background: "#fff", border: "1px solid rgba(0,0,0,0.08)",
                borderLeft: "3px solid #d4a03e"
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#1a1a1a", marginBottom: 8 }}>
                  "{obj.objection}"
                </div>
                <div style={{ fontSize: 14, color: "rgba(0,0,0,0.6)", lineHeight: 1.65 }}>
                  {obj.response}
                </div>
                <button
                  onClick={() => handleCopy(obj.response, "obj-" + i)}
                  style={{
                    marginTop: 10, padding: "4px 12px", borderRadius: 6, fontSize: 10,
                    border: "1px solid rgba(0,0,0,0.08)", background: copiedSection === "obj-" + i ? "rgba(16,185,129,0.06)" : "#f8f7f4",
                    color: copiedSection === "obj-" + i ? "#10b981" : "rgba(0,0,0,0.4)",
                    cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600
                  }}
                >
                  {copiedSection === "obj-" + i ? "✓ Copied" : "Copy Response"}
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

      {/* ═══ AUTH SCREEN ═══ */}
      {authScreen && (
        <div style={{
          ...S.app, alignItems: "center", justifyContent: "flex-start",
          background: "#f8f7f4",
          overflowY: "auto",
          padding: "48px 0 64px"
        }}>
          <div style={{ width: "100%", maxWidth: 400, padding: "0 24px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 40, justifyContent: "center" }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#e05a33", boxShadow: "0 0 8px rgba(224,90,51,0.3)" }} />
              <span style={{ fontSize: 28, fontWeight: 700, color: "#1a1a1a", fontFamily: "'Outfit', sans-serif" }}>primed</span>
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 400, color: "#1a1a1a", textAlign: "center", marginBottom: 8, fontFamily: "'Instrument Serif', Georgia, serif", fontStyle: "italic" }}>
              {authScreen === "login" ? "Welcome back." :
               authScreen === "signup" ? "Get started." :
               authScreen === "forgot" ? "Reset your password." :
               "Set a new password."}
            </h2>
            <p style={{ fontSize: 13, color: "rgba(0,0,0,0.4)", textAlign: "center", marginBottom: 32 }}>
              {authScreen === "login" ? "Log in to your account" :
               authScreen === "signup" ? "Create your free account" :
               authScreen === "forgot" ? "Enter your email to receive a reset link" :
               "Choose a password for your account"}
            </p>
            {authError && (
              <div style={{ padding: "10px 16px", borderRadius: 8, background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.2)", color: "#ef4444", fontSize: 13, marginBottom: 16, textAlign: "center" }}>{authError}</div>
            )}
            {authInfo && (
              <div style={{ padding: "10px 16px", borderRadius: 8, background: "rgba(34,197,94,0.1)", border: "1px solid rgba(34,197,94,0.2)", color: "#16a34a", fontSize: 13, marginBottom: 16, textAlign: "center" }}>{authInfo}</div>
            )}
            {authScreen === "signup" && (
              <input type="text" placeholder="Your name" value={authName} onChange={e => setAuthName(e.target.value)}
                style={{ width: "100%", padding: "13px 16px", background: "#f4f3f0", border: "1px solid rgba(0,0,0,0.1)", borderRadius: 10, color: "#1a1a1a", fontSize: 14, fontFamily: "'Outfit', sans-serif", outline: "none", marginBottom: 12, boxSizing: "border-box" }} />
            )}
            {(authScreen === "login" || authScreen === "signup" || authScreen === "forgot") && (
              <input type="email" placeholder="Email address" value={authEmail} onChange={e => setAuthEmail(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") { authScreen === "forgot" ? handleForgot() : handleAuth(authScreen === "signup"); } }}
                style={{ width: "100%", padding: "13px 16px", background: "#f4f3f0", border: "1px solid rgba(0,0,0,0.1)", borderRadius: 10, color: "#1a1a1a", fontSize: 14, fontFamily: "'Outfit', sans-serif", outline: "none", marginBottom: 12, boxSizing: "border-box" }} />
            )}

                  { key: "coldCallHook", label: "Cold Call Hook", desc: "First 10 seconds of any prospecting call", color: "#3b82f6" },
                  { key: "objectionAnchor", label: "\"Why Should I Work With You?\"", desc: "Your anchor for the most important question", color: "#8b5cf6" }
                ].map(({ key, label, desc, color }) => (
                  <div key={key} style={{ marginBottom: 20, padding: "20px 24px", borderRadius: 14, background: "#fff", border: "1px solid rgba(0,0,0,0.08)", borderLeft: `3px solid ${color}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 600, color: "#1a1a1a" }}>{label}</div>
                        <div style={{ fontSize: 11, color: "rgba(0,0,0,0.35)", marginTop: 2 }}>{desc}</div>
                      </div>
                      <button onClick={() => { navigator.clipboard.writeText(vsGeneratedScript[key]); setVsCopied(key); setTimeout(() => setVsCopied(null), 2000); }} style={{ padding: "5px 14px", borderRadius: 6, border: `1px solid ${vsCopied === key ? "rgba(16,185,129,0.3)" : "rgba(255,255,255,0.1)"}`, background: vsCopied === key ? "rgba(16,185,129,0.08)" : "rgba(255,255,255,0.03)", color: vsCopied === key ? "#10b981" : "rgba(226,224,219,0.4)", fontSize: 10, fontWeight: 600, fontFamily: "'DM Mono', monospace", cursor: "pointer", flexShrink: 0 }}>{vsCopied === key ? "✓ Copied" : "Copy"}</button>
                    </div>
                    <div style={{ fontSize: 14, lineHeight: 1.7, color: "rgba(0,0,0,0.65)", whiteSpace: "pre-wrap" }}>{vsGeneratedScript[key]}</div>
                  </div>
                ))}
                <div style={{ marginBottom: 28, padding: "20px 24px", borderRadius: 14, background: "rgba(212,160,62,0.04)", border: "1px solid rgba(212,160,62,0.12)" }}>
                  <div style={{ fontSize: 10, color: "#d4a03e", fontFamily: "'DM Mono', monospace", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10, fontWeight: 600 }}>Coaching Notes</div>
                  <div style={{ fontSize: 14, lineHeight: 1.7, color: "rgba(0,0,0,0.6)" }}>{vsGeneratedScript.coachingNotes}</div>
                </div>
                <div style={{ display: "flex", gap: 12 }}>
                  <button onClick={() => { setVsStep(1); setVsGeneratedScript(null); }} style={{ padding: "12px 28px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(0,0,0,0.45)", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Start Over</button>
                  <button onClick={() => { setAppMode("practice"); setPracticeState("setup"); }} style={{ padding: "12px 28px", borderRadius: 10, border: "none", background: "#e05a33", color: "#fff", fontSize: 13, fontWeight: 700, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>Practice Delivering It →</button>
                </div>
              </div>
            )}
          </div>
        </div>
        )}

        {showCustom && (
          <div style={S.modal} onClick={e => e.target === e.currentTarget && setShowCustom(false)}>
            <div style={S.modalContent}>
              <h3 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#1a1a1a", letterSpacing: "-0.01em" }}>
                Get Primed on Any Scenario
              </h3>
              <p style={{ fontSize: 13, color: "rgba(0,0,0,0.4)", marginTop: 8, lineHeight: 1.5 }}>
                Describe what's happening and we'll generate your full briefing — impact analysis, talk tracks, and client scripts.
              </p>
              <textarea
                value={customPrompt}
                onChange={e => setCustomPrompt(e.target.value)}
                placeholder="e.g., What if Amazon announces a new HQ in Austin, TX?"
                style={S.textarea}
                disabled={isGenerating}
              />
              <div style={S.modalBtns}>
                <button
                  style={{
                    padding: "10px 24px", borderRadius: 8,
                    border: "1px solid rgba(255,255,255,0.1)",
                    background: "transparent", color: "rgba(0,0,0,0.4)",
                    fontSize: 13, cursor: "pointer", fontFamily: "inherit"
                  }}
                  onClick={() => { setShowCustom(false); setCustomPrompt(""); }}
                  disabled={isGenerating}
                >
                  Cancel
                </button>
                <button
                  style={{
                    padding: "10px 24px", borderRadius: 8, border: "none",
                    background: isGenerating ? "rgba(224,90,51,0.2)" : "#e05a33",
                    color: isGenerating ? "#e05a33" : "#fff",
                    fontSize: 13, fontWeight: 700, cursor: isGenerating ? "wait" : "pointer",
                    fontFamily: "'DM Mono', monospace", letterSpacing: "0.02em",
                    transition: "all 0.2s"
                  }}
                  onClick={generateScenario}
                  disabled={isGenerating || !customPrompt.trim()}
                >
                  {isGenerating ? "Analyzing..." : "Get Primed"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
      )}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Primed));
  </script>
</body>
</html>
